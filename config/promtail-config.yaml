# ============================================================
# config/promtail-config.yaml
# ============================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Scrape all Docker container logs ──────────────────────
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label:  container
      - source_labels: [__meta_docker_container_log_stream]
        target_label:  stream
      # Use the container name as the job label so Loki queries are easy
      - source_labels: [__meta_docker_container_name]
        target_label:  job
        replacement:   "fluent-bit"

  # ── Also scrape host /var/log for system-level logs ────────
  - job_name: system
    static_configs:
      - targets: ["localhost"]
        labels:
          job:      system
          __path__: /var/log/*.log
