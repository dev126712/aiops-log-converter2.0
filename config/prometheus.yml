# ============================================================
# config/prometheus.yml
# ============================================================
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aiops-pipeline"
    static_configs:
      - targets: ["aiops-pipeline:8000"]   # prometheus-client default port

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "containers"
    static_configs:
      - targets: ["cadvisor:8080"]
